{% extends "base.html" %}

{% block title %}Eliminar registro{% endblock %}

{% block content %}
    <main class="form-shell">
        <section class="panel form-panel">
            <p class="section-kicker">Confirmación</p>
            <h2>Eliminar registro</h2>
            <p class="section-text">Vas a eliminar <strong>{{ entry.title }}</strong> de la categoría {{ entry.get_category_display }}. Esta acción no se puede deshacer.</p>

            <form method="post" class="toolbar">
                {% csrf_token %}
                <button type="submit" class="btn-danger">Sí, eliminar</button>
                <a class="btn-secondary" href="{% url 'curriculum:entry_list' %}">Cancelar</a>
            </form>
        </section>
    </main>
{% endblock %}
